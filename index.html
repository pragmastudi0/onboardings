<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Onboarding — Pragma Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --black:  #111110;
  --white:  #FFFFFF;
  --g1:     #F5F3F0;
  --g2:     #E8E5E0;
  --g3:     #9A9590;
  --g4:     #6B6762;
  --accent: #1847F0;
  --rule:   #E2DED9;
  --green:  #22c55e;
}

html { 
  font-size: 16px; 
  -webkit-font-smoothing: antialiased;
  -webkit-touch-callout: none;
}

body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--white);
  color: var(--black);
  line-height: 1.6;
  overflow-x: hidden;
  width: 100%;
  max-width: 100%;
}

/* ── TOPBAR ─────────────────────────────────────────── */
.topbar {
  border-bottom: 1px solid var(--rule);
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}

.topbar-brand { 
  font-size: 12px; 
  font-weight: 600; 
  letter-spacing: 0.04em; 
}

.topbar-meta  { 
  font-size: 10px; 
  color: var(--g3); 
}

/* ── HERO ───────────────────────────────────────────── */
.hero {
  padding: 40px 20px 30px;
  border-bottom: 1px solid var(--rule);
  width: 100%;
}

.hero-eyebrow {
  font-size: 10px; 
  font-weight: 600;
  letter-spacing: 0.12em; 
  text-transform: uppercase;
  color: var(--accent); 
  margin-bottom: 12px;
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  line-height: 1.1;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}

.hero-title em { 
  font-style: italic; 
  color: var(--g3); 
}

.hero-body {
  font-size: 13px; 
  color: var(--g4);
  line-height: 1.6; 
  font-weight: 300;
}

/* ── QUIZ CONTAINER ────────────────────────────────── */
.quiz-wrap {
  padding: 0;
  width: 100%;
  display: flex;
  flex-direction: column;
}

.quiz-grid {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.quiz-sidebar {
  padding: 16px 20px;
  background: var(--g1);
  border-bottom: 1px solid var(--rule);
  width: 100%;
}

.quiz-progress {
  margin-bottom: 12px;
}

.progress-label {
  font-size: 10px; 
  font-weight: 600;
  letter-spacing: 0.12em; 
  text-transform: uppercase;
  color: var(--accent); 
  margin-bottom: 8px;
}

.progress-bar-container {
  height: 6px;
  background: var(--white);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s ease;
}

.progress-text {
  font-size: 11px; 
  color: var(--g4); 
  font-weight: 500;
}

.quiz-section-badge {
  display: inline-block;
  background: var(--white);
  color: var(--accent);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 3px;
  margin-top: 12px;
  margin-bottom: 0;
}

.quiz-navigator {
  margin-top: 12px;
  padding: 10px;
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 6px;
}

.navigator-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.navigator-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--g3);
}

.navigator-toggle {
  background: var(--accent);
  border: none;
  color: var(--white);
  width: 24px;
  height: 24px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all 0.2s;
}

.navigator-toggle:active {
  transform: scale(0.95);
}

.navigator-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
  transition: all 0.3s ease;
  max-height: 500px;
  overflow: hidden;
}

.navigator-grid.collapsed {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  gap: 0;
}

.navigator-item {
  aspect-ratio: 1;
  border: 1px solid var(--rule);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 7px;
  font-weight: 700;
  cursor: pointer;
  background: var(--white);
  color: var(--g4);
  transition: all 0.15s;
  padding: 0;
  min-height: 28px;
  -webkit-user-select: none;
  user-select: none;
}

.navigator-item:active {
  transform: scale(0.95);
}

.navigator-item.answered {
  background: rgba(34, 197, 94, 0.15);
  border-color: var(--green);
  color: #16a34a;
}

.navigator-item.current {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--white);
  font-weight: 700;
}

.quiz-estimated {
  margin-top: 12px;
  padding: 10px;
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 6px;
  text-align: center;
}

.estimated-icon {
  font-size: 9px; 
  font-weight: 600;
  letter-spacing: 0.1em; 
  text-transform: uppercase;
  color: var(--g3); 
  margin-bottom: 4px;
}

.estimated-time {
  font-size: 13px; 
  font-weight: 600; 
  color: var(--black);
}

.estimated-note {
  font-size: 10px; 
  color: var(--g3); 
  margin-top: 2px;
}

/* ── MAIN QUIZ ─────────────────────────────────────── */
.quiz-main {
  display: none;
  padding: 20px;
  width: 100%;
}

.quiz-main.active {
  display: block;
}

.question-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  line-height: 1.2;
  margin-bottom: 20px;
  color: var(--black);
}

.options-hint {
  font-size: 11px;
  color: var(--g3);
  margin-bottom: 12px;
  font-style: italic;
}

.options-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.option-label {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--rule);
  border-radius: 6px;
  cursor: pointer;
  background: var(--white);
  transition: all 0.15s;
  -webkit-user-select: none;
  user-select: none;
}

.option-label:active {
  background: var(--g1);
}

.option-label input[type="checkbox"],
.option-label input[type="radio"] {
  margin-top: 3px;
  cursor: pointer;
  accent-color: var(--accent);
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  -webkit-appearance: none;
  appearance: none;
}

.option-label input:checked + .option-text {
  font-weight: 600;
  color: var(--accent);
}

.option-text {
  font-size: 13px;
  color: var(--black);
  line-height: 1.4;
  flex: 1;
}

.text-input-group {
  display: none;
  margin-bottom: 24px;
}

.text-input-group.active {
  display: block;
}

.text-input-group textarea {
  width: 100%;
  padding: 12px 14px;
  font-size: 14px;
  font-family: 'Instrument Sans', sans-serif;
  border: 1px solid var(--rule);
  border-radius: 6px;
  resize: vertical;
  min-height: 100px;
  color: var(--black);
  -webkit-appearance: none;
  appearance: none;
  -webkit-user-select: text;
  user-select: text;
}

.text-input-group textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--g1);
}

.text-input-group textarea::placeholder {
  color: var(--g3);
}

/* ── BUTTONS ────────────────────────────────────────── */
.quiz-controls {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  margin-bottom: 20px;
  padding: 0 20px;
}

.btn-nav {
  padding: 12px 14px;
  border: 1px solid var(--rule);
  background: var(--white);
  color: var(--black);
  border-radius: 6px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  display: none;
  transition: all 0.15s;
  -webkit-user-select: none;
  user-select: none;
}

.btn-nav.visible {
  display: block;
}

.btn-nav:active {
  background: var(--g1);
}

.btn-next {
  flex: 1;
  padding: 12px 14px;
  background: var(--accent);
  color: var(--white);
  border: none;
  border-radius: 6px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-user-select: none;
  user-select: none;
}

.btn-next:active {
  background: #0935c9;
  transform: scale(0.98);
}

/* ── REVIEW SCREEN ─────────────────────────────────── */
.quiz-review {
  display: none;
  padding: 20px;
  width: 100%;
}

.quiz-review.active {
  display: block;
}

.review-title {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  line-height: 1.1;
  margin-bottom: 24px;
  color: var(--black);
}

.review-section {
  margin-bottom: 32px;
}

.review-section-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
}

.review-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.review-card {
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 12px;
  background: var(--white);
}

.review-card-label {
  font-size: 9px; 
  font-weight: 600;
  letter-spacing: 0.1em; 
  text-transform: uppercase;
  color: var(--accent); 
  margin-bottom: 6px;
}

.review-card-question {
  font-size: 12px; 
  font-weight: 600;
  color: var(--black); 
  margin-bottom: 8px;
}

.review-card-answer {
  font-size: 12px;
  color: var(--g4);
  line-height: 1.5;
}

.review-actions {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.btn-copy,
.btn-download {
  padding: 12px 14px;
  border: none;
  border-radius: 6px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s;
  -webkit-user-select: none;
  user-select: none;
}

.btn-copy {
  background: var(--accent);
  color: var(--white);
}

.btn-copy:active {
  background: #0935c9;
}

.btn-download {
  background: var(--white);
  color: var(--accent);
  border: 1px solid var(--accent);
}

.btn-download:active {
  background: var(--g1);
}

.completion-box {
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 16px 12px;
  text-align: center;
  background: var(--g1);
}

.completion-icon {
  font-size: 28px;
  margin-bottom: 8px;
}

.completion-text {
  font-size: 13px; 
  font-weight: 600;
  color: var(--black);
}

.completion-subtext {
  font-size: 11px;
  color: var(--g4);
  margin-top: 6px;
}

/* ── FOOTER ─────────────────────────────────────────── */
.doc-footer {
  padding: 24px 20px;
  border-top: 1px solid var(--rule);
  font-size: 11px;
  color: var(--g4);
  text-align: center;
}

.foot-brand { 
  font-size: 11px; 
  font-weight: 600; 
  color: var(--black); 
  margin-bottom: 4px; 
}

.foot-tagline { 
  font-size: 10px; 
  color: var(--g3); 
  margin-bottom: 8px;
}

.foot-contact { 
  font-size: 10px;
}

.foot-contact a { 
  color: var(--accent); 
  text-decoration: none; 
}

/* ── SAFE AREA (iPhone notch) ────────────────────── */
@supports (padding: max(0px)) {
  .topbar {
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
  }
  
  .quiz-sidebar {
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
  }
  
  .quiz-main,
  .quiz-review {
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
  }
  
  .quiz-controls {
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
  }
  
  .doc-footer {
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
  }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">Pragma Studio</div>
  <div class="topbar-meta">Onboarding</div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">Cuestionario</div>
  <h1 class="hero-title">Descubrimiento <em>proyecto</em></h1>
  <p class="hero-body">Completa el cuestionario para validar todos los detalles del proyecto.</p>
</div>

<!-- QUIZ -->
<div class="quiz-wrap">
  
  <!-- SIDEBAR -->
  <div class="quiz-sidebar">
    <div class="quiz-progress">
      <div class="progress-label">Progreso</div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text"><span id="current-q">1</span> / <span id="total-q">56</span></div>
    </div>

    <div class="quiz-section-badge" id="section-badge">A</div>

    <div class="quiz-navigator">
      <div class="navigator-header">
        <div class="navigator-label">Nav</div>
        <button class="navigator-toggle" id="navigator-toggle" onclick="toggleNavigator()">−</button>
      </div>
      <div class="navigator-grid" id="navigator-grid"></div>
    </div>

    <div class="quiz-estimated">
      <div class="estimated-icon">⏱</div>
      <div class="estimated-time" id="estimated-time">15m</div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="quiz-main active" id="quiz-main">
    <h2 class="question-title" id="q-title">Pregunta</h2>
    <div class="options-hint" id="options-hint"></div>
    <div class="options-group" id="q-options"></div>
    <div class="text-input-group" id="q-text-input">
      <textarea id="text-answer" placeholder="Tu respuesta..."></textarea>
    </div>
    <div class="quiz-controls">
      <button class="btn-nav" id="btn-prev" onclick="previousQuestion()">← Ant</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Sig →</button>
      <button class="btn-next" id="btn-finish" onclick="finishQuiz()" style="display: none;">Finalizar</button>
    </div>
  </div>

  <!-- REVIEW SCREEN -->
  <div class="quiz-review" id="quiz-review">
    <h2 class="review-title">Respuestas</h2>
    <div id="review-sections"></div>
    <div class="review-actions">
      <button class="btn-copy" onclick="copyAnswers()">📋 Copiar</button>
      <button class="btn-download" onclick="downloadAnswers()">⬇ HTML</button>
    </div>
    <div class="completion-box">
      <div class="completion-icon">✓</div>
      <div class="completion-text">¡Completado!</div>
      <div class="completion-subtext">Listo para compartir</div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="doc-footer">
  <div class="foot-brand">Pragma Studio</div>
  <div class="foot-tagline">Desarrollo de software a medida</div>
  <div class="foot-contact">
    <a href="https://wa.me/5493513911596">+54 3513 91-1596</a>
  </div>
</div>

  { id: "C4-impresora", section: "C", title: "¿Impresora térmica?", type: "text", placeholder: "Marca, modelo, ancho...", answered: false },
  { id: "C4-ticket", section: "C", title: "¿Info en ticket?", type: "multiple", options: ["Logo", "Datos", "Items", "Totales", "Leyendas", "Agradecimiento", "Cajero"], answered: false },
  { id: "C5-anulacion", section: "C", title: "¿Anular venta?", type: "text", placeholder: "Tiempo...", answered: false },
  { id: "C5-devoluciones", section: "C", title: "¿Devoluciones?", type: "multiple", options: ["Efectivo", "Nota crédito", "Cambio", "No"], answered: false },
  { id: "C6-login", section: "C", title: "¿Ver sin login?", type: "multiple", options: ["Todo", "Solo productos", "Precios con login", "Por definir"], answered: false },
  { id: "C6-stock-visible", section: "C", title: "¿Stock disponible?", type: "multiple", options: ["Cantidad exacta", "Hay/Pocas/Sin stock", "No muestran", "Otro"], answered: false },
  { id: "C6-productos", section: "C", title: "¿Productos ocultos?", type: "text", placeholder: "Cuáles...", answered: false },
  { id: "C7-minimo", section: "C", title: "¿Mínimo de compra?", type: "text", placeholder: "Monto/cantidad...", answered: false },
  { id: "C7-minimo-producto", section: "C", title: "¿Mínimo por producto?", type: "text", placeholder: "Productos...", answered: false },
  { id: "C7-observaciones", section: "C", title: "¿Observaciones?", type: "multiple", options: ["Sí, completas", "Solo comentarios", "No", "Otro"], answered: false },
  { id: "C7-entrega", section: "C", title: "¿Opciones entrega?", type: "multiple", options: ["Retira local", "Envío local", "Transporte", "Solo WhatsApp"], answered: false },
  { id: "C8-whatsapp", section: "C", title: "¿Formato WhatsApp?", type: "text", placeholder: "Formato...", answered: false },
  { id: "C9-roles", section: "C", title: "¿Roles?", type: "multiple", options: ["Admin", "Vendedor", "Depósito", "Gerente", "Reportes"], answered: false },
  
  // BLOQUE D
  { id: "D1-reportes", section: "D", title: "¿Reportes más usados?", type: "multiple", options: ["Ingresos", "Ventas producto", "Ventas vendedor", "Stock", "Deudas", "Performance"], answered: false },
  { id: "D1-kpis", section: "D", title: "¿KPIs importantes?", type: "text", placeholder: "Ventas, stock, deudas...", answered: false },
  { id: "D1-dashboard", section: "D", title: "¿Dashboard tiempo real?", type: "multiple", options: ["Sí, tiempo real", "Sí, no debe serlo", "No, reportes"], answered: false },
  { id: "D2-logo", section: "D", title: "¿Tienes logo?", type: "multiple", options: ["PNG", "SVG", "Ambos", "No"], answered: false },
  { id: "D2-colores", section: "D", title: "¿Paleta de colores?", type: "text", placeholder: "Códigos hex...", answered: false },
  { id: "D2-tipografia", section: "D", title: "¿Tipografía?", type: "text", placeholder: "Referencias...", answered: false },
  { id: "D2-tono", section: "D", title: "¿Tono de comunicación?", type: "multiple", options: ["Formal", "Amigable", "Técnico", "Lúdico"], answered: false },
  { id: "D3-descripciones", section: "D", title: "¿Quién carga descripciones?", type: "multiple", options: ["Todos", "Admin", "Especialista", "Por definir"], answered: false },
  { id: "D3-fotos", section: "D", title: "¿Quién carga fotos?", type: "multiple", options: ["Todos", "Admin", "Fotógrafo", "Por definir"], answered: false },
  { id: "D3-paginas", section: "D", title: "¿Páginas estáticas?", type: "multiple", options: ["Quiénes somos", "Contacto", "Envíos", "T&C", "Todas"], answered: false },
  { id: "D4-contacto", section: "D", title: "¿Contacto principal?", type: "text", placeholder: "Nombre, teléfono...", answered: false }
];

let currentQuestion = 0;
const answers = {};

function getSectionName(s) {
  const map = { A: "A", B: "B", C: "C", D: "D" };
  return map[s] || s;
}

document.getElementById('total-q').textContent = questions.length;

function buildNavigatorGrid() {
  const grid = document.getElementById('navigator-grid');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    const item = document.createElement('button');
    item.className = 'navigator-item';
    item.textContent = i + 1;
    item.type = 'button';
    if (q.answered) item.classList.add('answered');
    if (i === currentQuestion) item.classList.add('current');
    item.onclick = (e) => { e.preventDefault(); showQuestion(i); };
    item.title = `P${i + 1}`;
    grid.appendChild(item);
  });
}

function toggleNavigator() {
  const grid = document.getElementById('navigator-grid');
  const btn = document.getElementById('navigator-toggle');
  grid.classList.toggle('collapsed');
  btn.textContent = grid.classList.contains('collapsed') ? '+' : '−';
}

function showQuestion(i) {
  currentQuestion = i;
  const q = questions[i];
  
  document.getElementById('q-title').textContent = q.title;
  document.getElementById('current-q').textContent = i + 1;
  document.getElementById('section-badge').textContent = getSectionName(q.section);
  
  const pct = ((i + 1) / questions.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  
  const remain = Math.ceil((questions.length - i - 1) * 0.5);
  document.getElementById('estimated-time').textContent = (remain > 0 ? remain + 'm' : 'Listo');
  
  const opts = document.getElementById('q-options');
  const hint = document.getElementById('options-hint');
  opts.innerHTML = '';
  document.getElementById('q-text-input').classList.remove('active');
  
  if (q.type === 'multiple') {
    hint.textContent = 'Selecciona una o más';
    hint.style.display = 'block';
    q.options.forEach((opt) => {
      const label = document.createElement('label');
      label.className = 'option-label';
      const input = document.createElement('input');
      input.type = 'checkbox';
      if (!answers[q.id]) answers[q.id] = [];
      input.checked = answers[q.id].includes(opt);
      input.onchange = (e) => {
        if (e.target.checked) {
          if (!answers[q.id].includes(opt)) answers[q.id].push(opt);
        } else {
          answers[q.id] = answers[q.id].filter(a => a !== opt);
        }
        questions[i].answered = answers[q.id].length > 0;
        buildNavigatorGrid();
      };
      const span = document.createElement('span');
      span.className = 'option-text';
      span.textContent = opt;
      label.appendChild(input);
      label.appendChild(span);
      opts.appendChild(label);
    });
  } else {
    hint.style.display = 'none';
    document.getElementById('q-text-input').classList.add('active');
    const textarea = document.getElementById('text-answer');
    textarea.value = answers[q.id] || '';
    textarea.placeholder = q.placeholder;
    textarea.oninput = (e) => {
      answers[q.id] = e.target.value;
      questions[i].answered = e.target.value.trim().length > 0;
      buildNavigatorGrid();
    };
  }
  
  document.getElementById('btn-prev').classList.toggle('visible', i > 0);
  document.getElementById('btn-next').style.display = i < questions.length - 1 ? 'block' : 'none';
  document.getElementById('btn-finish').style.display = i === questions.length - 1 ? 'block' : 'none';
  buildNavigatorGrid();
}

function nextQuestion() {
  if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1);
}

function previousQuestion() {
  if (currentQuestion > 0) showQuestion(currentQuestion - 1);
}

function finishQuiz() {
  document.getElementById('quiz-main').classList.remove('active');
  document.getElementById('quiz-review').classList.add('active');
  const sec = document.getElementById('review-sections');
  sec.innerHTML = '';
  const grouped = {};
  questions.forEach(q => {
    const ans = answers[q.id];
    if (ans && ((Array.isArray(ans) && ans.length > 0) || (!Array.isArray(ans) && ans.trim()))) {
      if (!grouped[q.section]) grouped[q.section] = [];
      grouped[q.section].push(q);
    }
  });
  Object.keys(grouped).sort().forEach(s => {
    const div = document.createElement('div');
    div.className = 'review-section';
    const title = document.createElement('div');
    title.className = 'review-section-title';
    title.textContent = 'Bloque ' + getSectionName(s);
    div.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'review-grid';
    grouped[s].forEach(q => {
      const ans = answers[q.id];
      const card = document.createElement('div');
      card.className = 'review-card';
      const lbl = document.createElement('div');
      lbl.className = 'review-card-label';
      lbl.textContent = Array.isArray(ans) ? 'Selección' : 'Respuesta';
      const qtitle = document.createElement('div');
      qtitle.className = 'review-card-question';
      qtitle.textContent = q.title;
      const aDiv = document.createElement('div');
      aDiv.className = 'review-card-answer';
      if (Array.isArray(ans)) {
        aDiv.innerHTML = ans.map(a => `<div>✓ ${a}</div>`).join('');
      } else {
        aDiv.textContent = ans;
      }
      card.appendChild(lbl);
      card.appendChild(qtitle);
      card.appendChild(aDiv);
      grid.appendChild(card);
    });
    div.appendChild(grid);
    sec.appendChild(div);
  });
}

function copyAnswers() {
  let txt = 'RESPUESTAS ONBOARDING\n' + '='.repeat(40) + '\n\n';
  let sec = '';
  questions.forEach(q => {
    const ans = answers[q.id];
    if (ans && ((Array.isArray(ans) && ans.length > 0) || (!Array.isArray(ans) && ans.trim()))) {
      if (sec !== q.section) {
        sec = q.section;
        txt += '\nBloque ' + getSectionName(sec) + '\n' + '-'.repeat(40) + '\n\n';
      }
      txt += '• ' + q.title + '\n';
      if (Array.isArray(ans)) {
        ans.forEach(a => { txt += '  ✓ ' + a + '\n'; });
      } else {
        txt += '  ' + ans + '\n';
      }
      txt += '\n';
    }
  });
  navigator.clipboard.writeText(txt).then(() => {
    const btn = event.target;
    btn.textContent = '✓ Copiado!';
    setTimeout(() => { btn.textContent = '📋 Copiar'; }, 1500);
  });
}

function downloadAnswers() {
  let html = '<style>body{font-family:sans-serif;padding:20px}h1{color:#1847F0}h2{color:#1847F0;font-size:14px;margin-top:20px}.card{border:1px solid #eee;padding:10px;margin:10px 0;border-radius:5px}.q{font-weight:bold;margin:5px 0}.a{color:#666}</style>';
  html += '<h1>Respuestas Cuestionario</h1>';
  let sec = '';
  questions.forEach(q => {
    const ans = answers[q.id];
    if (ans && ((Array.isArray(ans) && ans.length > 0) || (!Array.isArray(ans) && ans.trim()))) {
      if (sec !== q.section) {
        sec = q.section;
        html += '<h2>Bloque ' + getSectionName(sec) + '</h2>';
      }
      html += '<div class="card"><div class="q">' + q.title + '</div><div class="a">';
      if (Array.isArray(ans)) {
        html += ans.map(a => '✓ ' + a).join('<br>');
      } else {
        html += ans;
      }
      html += '</div></div>';
    }
  });
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'respuestas.html';
  a.click();
}

showQuestion(0);
const isWhatsApp = /WhatsApp/i.test(navigator.userAgent);
if (isWhatsApp) {
  document.body.style.maxWidth = '100vw';
}
// Comprimir navegador por defecto
document.getElementById('navigator-grid').classList.add('collapsed');
document.getElementById('navigator-toggle').textContent = '+';
</script>
